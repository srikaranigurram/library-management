<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Member</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .back {
            text-align: center;
            margin-top: 10px;
        }

        .back a {
            text-decoration: none;
            color: #667eea;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Add Member</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Enter Name" required>
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="text" name="phone" placeholder="Enter Phone" required>

        <button type="submit">Add Member</button>
    </form>

    <div class="back">
        <a href="{% url 'member_list' %}">← Back to Members</a>
    </div>
</div>

</body>
</html>
