<!DOCTYPE html>
<html lang="en">
<head>
    <title>Return Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="card p-4 mb-4">
        <div class="d-flex align-items-center justify-content-between">

            <a href="{% url 'home' %}" class="btn btn-secondary">🏠 Home</a>

            <h2 class="m-0 flex-grow-1 text-center">📥 Return Book</h2>

            <div></div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card p-3">
        <table class="table table-hover">

            <thead class="table-dark">
                <tr>
                    <th>Book</th>
                    <th>Member</th>
                    <th>Issue Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for t in transactions %}
                <tr>
                    <td>{{ t.book.title }}</td>
                    <td>{{ t.member.name }}</td>
                    <td>{{ t.issue_date }}</td>
                    <td>
                        <a href="{% url 'return_action' t.id %}" class="btn btn-success btn-sm">
                            Return
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No issued books 😶</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
