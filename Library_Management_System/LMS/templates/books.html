<!DOCTYPE html>
<html lang="en">
<head>
    <title>Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: linear-gradient(135deg, #667eea, #6a47eb);
            color: white;
        }

        th {
            text-align: center;
            padding: 12px;
        }

        td {
            text-align: center;
            padding: 12px;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-home {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER CARD -->
    <div class="card p-4 mb-4">
        <div class="d-flex align-items-center justify-content-between">

            <!-- Home -->
            <a href="{% url 'home' %}" class="btn btn-home">
                🏠 Home
            </a>

            <!-- Title -->
            <h2 class="m-0 flex-grow-1 text-center">
                📚 Books
            </h2>

            <!-- Add -->
            <a href="{% url 'add_book' %}" class="btn btn-primary">
                + Add Book
            </a>

        </div>
    </div>

    <!-- TABLE CARD -->
    <div class="card p-3">

        <table class="table">

            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>ISBN</th>
                    <th>Available</th>
                </tr>
            </thead>

            <tbody>
                {% for book in books %}
                <tr>
                    <td>{{ book.title }}</td>
                    <td>{{ book.author.name }}</td>
                    <td>{{ book.isbn }}</td>
                    <td>{{ book.available_copies }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
