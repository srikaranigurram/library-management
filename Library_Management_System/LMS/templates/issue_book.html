<!DOCTYPE html>
<html lang="en">
<head>
    <title>Issue Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER (same as members/books) -->
    <div class="card p-4 mb-4">
        <div class="d-flex align-items-center justify-content-between">

            <a href="{% url 'home' %}" class="btn btn-secondary">🏠 Home</a>

            <h2 class="m-0 flex-grow-1 text-center">📤 Issue Book</h2>

            <div></div> <!-- empty for spacing -->
        </div>
    </div>

    <!-- FORM CARD -->
    <div class="card p-4">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Book</label>
                <select name="book" class="form-control" required>
                    {% for book in books %}
                        <option value="{{ book.id }}">
                            {{ book.title }} (Available: {{ book.available_copies }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label>Member</label>
                <select name="member" class="form-control" required>
                    {% for member in members %}
                        <option value="{{ member.id }}">
                            {{ member.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Issue Book
            </button>

        </form>

    </div>

</div>

</body>
</html>
